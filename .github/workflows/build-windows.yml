name: Build Windows

# 手動実行（Actionsタブの Run workflow）か、v1.0.0 などのタグ push でビルド
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm install

      # Windows用 ReazonSpeech 常駐サーバー（sherpa-onnx, MT静的＝自己完結）をサイドカーとして取得
      - name: Fetch Windows ReazonSpeech server (sidecar)
        shell: pwsh
        run: |
          $url = "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.3/sherpa-onnx-v1.13.3-win-x64-static-MT-Release.tar.bz2"
          Invoke-WebRequest -Uri $url -OutFile sherpa.tar.bz2
          tar -xjf sherpa.tar.bz2
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item "sherpa-onnx-v1.13.3-win-x64-static-MT-Release/bin/sherpa-onnx-offline-websocket-server.exe" "src-tauri/binaries/sherpa-onnx-offline-websocket-server-x86_64-pc-windows-msvc.exe" -Force
          Get-Item "src-tauri/binaries/sherpa-onnx-offline-websocket-server-x86_64-pc-windows-msvc.exe" | Select-Object Name,Length

      - name: Build (Tauri / Windows)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      # 出来上がったインストーラ(.exe / .msi)＋自動更新用の署名(.sig)を成果物として保存
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: KaikeiVoice-windows
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
